  <!-- ===== AI FORECAST ENGINE ===== -->

  <script>
  // Ball color mapping (dynamically uses BALL_COLORS from marksix_data.js)
  function getBallClass(n) {
    if (typeof BALL_COLORS !== 'undefined') {
      if (BALL_COLORS.red && BALL_COLORS.red.includes(n)) return 'ball-red';
      if (BALL_COLORS.blue && BALL_COLORS.blue.includes(n)) return 'ball-blue';
      if (BALL_COLORS.green && BALL_COLORS.green.includes(n)) return 'ball-green';
    } else {
      // Fallback to hardcoded list if data not loaded
      const redNums = [1, 2, 7, 8, 12, 13, 18, 19, 23, 24, 29, 30, 34, 35, 40, 45, 46];
      const blueNums = [3, 4, 9, 10, 14, 15, 20, 25, 26, 31, 36, 37, 41, 42, 47, 48];
      const greenNums = [5, 6, 11, 16, 17, 21, 22, 27, 28, 32, 33, 38, 39, 43, 44, 49];
      
      if (redNums.includes(n)) return 'ball-red';
      if (blueNums.includes(n)) return 'ball-blue';
      if (greenNums.includes(n)) return 'ball-green';
    }
    return '';
  }

  // Weighted random pick without replacement
  // weights: array of {num, weight}
  function weightedPick(pool, count) {
    const result = [];
    const available = pool.slice();

    for (let i = 0; i < count; i++) {
      if (available.length === 0) break;
      const totalW = available.reduce((s, x) => s + x.weight, 0);
      let r = Math.random() * totalW;
      let chosen = available[available.length - 1];
      for (let j = 0; j < available.length; j++) {
        r -= available[j].weight;
        if (r <= 0) { chosen = available[j]; break; }
      }
      result.push(chosen.num);
      const idx = available.indexOf(chosen);
      available.splice(idx, 1);
    }
    return result.sort((a, b) => a - b);
  }

  // Forecast strategy A: HOT-biased (70% hot zone weight boost)
  function forecastHot(count) {
    const pool = [];
    for (let n = 1; n <= 49; n++) {
      let w = HIST_FREQ[n];
      if (HOT_NUMS.includes(n)) w = Math.round(w * 1.7);
      pool.push({ num: n, weight: w });
    }
    return weightedPick(pool, count);
  }

  // Forecast strategy B: BALANCED (hot + overdue cold numbers)
  function forecastBalanced(count) {
    const pool = [];
    for (let n = 1; n <= 49; n++) {
      let w = HIST_FREQ[n];
      if (HOT_NUMS.includes(n))  w = Math.round(w * 1.4);
      if (COLD_NUMS.includes(n)) w = Math.round(w * 1.3); // overdue boost
      pool.push({ num: n, weight: w });
    }
    return weightedPick(pool, count);
  }

  // Render ball elements with staggered animation
  function renderBalls(numbers, containerId) {
    const container = document.getElementById(containerId);
    container.innerHTML = '';
    numbers.forEach((n, idx) => {
      const ball = document.createElement('div');
      ball.className = `ball ${getBallClass(n)}`;
      ball.textContent = n < 10 ? '0' + n : n;
      ball.style.animationDelay = (idx * 0.08) + 's';
      container.appendChild(ball);
    });
  }

  // Main AI forecast trigger
  function runAIForecast() {
    // Re-use the input number from the first section
    const mainInput = document.forms['randomizer'].inum;
    let count = parseInt(mainInput.value);

    if (isNaN(count) || count < 6) { count = 6; mainInput.value = 6; }
    if (count > 49) { count = 49; mainInput.value = 49; }

    const setA = forecastHot(count);
    const setB = forecastBalanced(count);

    renderBalls(setA, 'forecastBallsA');
    renderBalls(setB, 'forecastBallsB');

    // Update description labels
    document.getElementById('forecastLabelA').textContent =
      `Forecast 1 — Hot-Trend (${count} numbers)`;
    document.getElementById('forecastLabelB').textContent =
      `Forecast 2 — Balanced (${count} numbers)`;

    const resultsDiv = document.getElementById('forecastResults');
    resultsDiv.classList.remove('visible');
    void resultsDiv.offsetWidth; // reflow to restart CSS animation
    resultsDiv.classList.add('visible');
  }

  // Trigger server-side sync (via PHP bridge)
  // isSilent: if true, no UI changes unless updated
  async function syncData(isSilent = false) {
    const btn = document.getElementById('syncBtn');
    const OriginalText = btn ? btn.innerHTML : "Update Results";
    
    if (!isSilent && btn) {
      btn.disabled = true;
      btn.innerHTML = "⏳ Syncing Data...";
    }

    try {
      const resp = await fetch('sync.php');
      const data = await resp.json();
      console.log('Sync Result:', data);
      
      // Check if the script actually updated the data
      const wasUpdated = data.details && data.details.includes('RESULT:updated');
      
      if (wasUpdated) {
        if (btn) btn.innerHTML = "✅ New Results Found!";
        // Reload page to get new .js data
        setTimeout(() => window.location.reload(), 1500);
      } else {
        if (!isSilent && btn) {
          btn.innerHTML = "✅ Already Up-to-date";
          setTimeout(() => { btn.innerHTML = OriginalText; btn.disabled = false; }, 3000);
        }
      }
    } catch (e) {
      console.error('Auto-sync check failed (Expected if local/no-php):', e);
      if (!isSilent && btn) {
        btn.innerHTML = "❌ Sync Failed";
        btn.disabled = false;
        setTimeout(() => btn.innerHTML = OriginalText, 3000);
      }
    }
  }
  </script>
